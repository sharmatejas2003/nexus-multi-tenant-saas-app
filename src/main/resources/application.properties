spring.application.name=Multi_Tenant_Saas

# ===== DATABASE =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ===== JSP VIEWS =====
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ===== SECURITY =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.filter.dispatcher-types=request,async,error
server.servlet.session.cookie.name=NEXUS_SaaS_SESSION

# ===== FILE UPLOAD =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:/tmp/uploads}

# ===== MAIL (Gmail SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:your@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:yourapppassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===== APP BASE URL (for invite links) =====
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===== SERVER =====
server.port=${PORT:8080}

# ===== LOGGING =====
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.com.app=DEBUG