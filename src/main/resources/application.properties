spring.application.name=Multi_Tenant_Saas

# ===== DATABASE =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning (reduces connection wait time = faster loads)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000

# ===== JPA =====
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

# PERFORMANCE FIX: disable show-sql — this was causing massive slowdowns
# Every query was being printed to stdout, blocking the render thread
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Second-level cache (speeds up repeated reads)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# ===== JSP VIEWS =====
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ===== SECURITY =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.filter.dispatcher-types=request,async,error
server.servlet.session.cookie.name=NEXUS_SaaS_SESSION

# ===== FILE UPLOAD =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:/tmp/uploads}

# ===== MAIL (Gmail SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:your@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:yourapppassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===== APP BASE URL =====
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===== SERVER =====
server.port=${PORT:8080}

# PERFORMANCE FIX: compress responses (faster page loads over network)
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# ===== LOGGING =====
# PERFORMANCE FIX: was DEBUG before — that prints every SQL + Spring internals
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.app=INFO